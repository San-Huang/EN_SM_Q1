function sum(arr){return arr.reduce((a,b)=>a+b,0);}
function maxWeek(rows,key){return rows.reduce((a,b)=>b[key]>a[key]?b:a);}
function kpis(cards){return`<div class="kpis">${cards.map(c=>`<div class="kpi"><div class="kpi-label">${c.l}</div><div class="kpi-val">${c.v}</div><div class="kpi-sub">${c.s||''}</div></div>`).join('')}</div>`;}

async function fetchSummary(prompt,boxId){
  const box=document.getElementById(boxId);
  if(!box)return;
  const text=STATIC_SUMMARIES[boxId]||"";
  box.textContent=text;
  box.classList.remove("loading");
}
function buildCreator(pid,name,rows,color){
  const el=document.getElementById(pid);
  const totalPosts=sum(rows.map(r=>r.posts));
  const totalMono=sum(rows.map(r=>r.mono));
  const avgIG=avg(rows.map(r=>r.ig_views));
  const avgTT=avg(rows.map(r=>r.tt_views));
  const avgComp=avg(rows.map(r=>r.completion));
  const peakMono=maxWeek(rows,'mono');
  const peakIG=maxWeek(rows,'ig_views');
  const prompt=`Creator: ${name}, Q1 2026:\n- Total posts: ${totalPosts}, Total FB revenue: $${totalMono.toFixed(0)}\n- IG avg views: ${fmtK(avgIG)}, TT avg views: ${fmtK(avgTT)}, FB completion rate: ${avgComp.toFixed(1)}%\n- Peak revenue week: ${peakMono.week} ($${peakMono.mono.toFixed(0)}), Peak IG week: ${peakIG.week} (${fmtK(peakIG.ig_views)})\n- Weekly monetization: ${rows.map(r=>'$'+r.mono.toFixed(0)).join(', ')}\nAnalyze Q1 performance highlights, platform strengths, and revenue trends.`;
  el.innerHTML=`
    ${kpis([{l:'Q1 total posts',v:totalPosts,s:'all weeks'},{l:'IG avg views',v:fmtK(avgIG),s:'active weeks avg'},{l:'TT avg views',v:fmtK(avgTT),s:'active weeks avg'},{l:'FB completion rate',v:avgComp.toFixed(1)+'%',s:'FB avg'},{l:'Q1 monetization',v:'$'+totalMono.toFixed(0),s:'FB total'}])}
    <div class="summary-box loading" id="sum-${pid}">正在生成分析小结...</div>
    <div class="mtog-row" id="mtog-${pid}"></div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:6px;font-size:11px;color:#888780">
      <span style="display:inline-block;width:12px;height:2px;background:${color}"></span>${name}
      <span style="display:inline-block;width:12px;height:1.5px;background:#ccc"></span>post count (right axis)
    </div>
    <div style="position:relative;height:260px"><canvas id="c-${pid}-main"></canvas></div>`;
  const el2=document.getElementById(`mtog-${pid}`);
  el2.innerHTML=METRICS.map(m=>`<button class="mtog${m.key==='ig_views'?' on':''}" data-key="${m.key}">${m.label}</button>`).join('');
  el2.addEventListener('click',e=>{
    const b=e.target.closest('.mtog');if(!b)return;
    el2.querySelectorAll('.mtog').forEach(x=>{x.classList.remove('on');x.style.cssText='';});
    b.classList.add('on');b.style.background='#378ADD';b.style.borderColor='#378ADD';b.style.color='#fff';
    renderCreatorMain(pid,name,rows,color,b.dataset.key);
  });
  renderCreatorMain(pid,name,rows,color,'ig_views');
  fetchSummary(prompt,`sum-${pid}`);
}

function renderCreatorMain(pid,name,rows,color,key){
  const def=METRICS.find(m=>m.key===key);
  const cid=`c-${pid}-main`;if(CH[cid])CH[cid].destroy();
  CH[cid]=new Chart(document.getElementById(cid),{type:'line',
    data:{labels:WEEKS,datasets:[
      {label:name,data:rows.map(r=>r[key]),borderColor:color,backgroundColor:color+'18',tension:0.3,pointRadius:4,borderWidth:2,yAxisID:'y',fill:true},
      {label:'Posts',data:rows.map(r=>r.posts),borderColor:'#ccc',borderDash:[4,3],backgroundColor:'transparent',tension:0.3,pointRadius:3,borderWidth:1.5,yAxisID:'y2'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+(ctx.datasetIndex===0?def.fmt(ctx.parsed.y):ctx.parsed.y+' posts')}}},
      scales:{x:{ticks:{font:{size:10},maxRotation:45,autoSkip:false}},y:{ticks:{font:{size:10},callback:v=>def.fmt(v)},title:{display:true,text:def.label,font:{size:9},color:'#888'}},y2:{position:'right',ticks:{font:{size:10}},grid:{drawOnChartArea:false},title:{display:true,text:'posts',font:{size:9},color:'#ccc'}}}}
  });
}

function buildCompare(){
  const el=document.getElementById('panel-compare');
  const cmpData={};
  Object.keys(DATA).forEach(cr=>{cmpData[cr]={};METRICS.forEach(m=>{cmpData[cr][m.key]=DATA[cr].map(r=>r[m.key]);});});
  const posts=DATA.isabella.map((_,i)=>sum(Object.values(DATA).map(d=>d[i]?d[i].posts:0)));
  const prompt=`Q1 2026 four-creator comparison:\nIsabella: ${sum(DATA.isabella.map(r=>r.posts))} posts, $${sum(DATA.isabella.map(r=>r.mono)).toFixed(0)}, IG avg ${fmtK(avg(DATA.isabella.map(r=>r.ig_views)))}, completion ${avg(DATA.isabella.map(r=>r.completion)).toFixed(1)}%\nZhuri: ${sum(DATA.zhuri.map(r=>r.posts))} posts, $${sum(DATA.zhuri.map(r=>r.mono)).toFixed(0)}, IG avg ${fmtK(avg(DATA.zhuri.map(r=>r.ig_views)))}, completion ${avg(DATA.zhuri.map(r=>r.completion)).toFixed(1)}%\nAssets: ${sum(DATA.assets.map(r=>r.posts))} posts, $${sum(DATA.assets.map(r=>r.mono)).toFixed(0)}, IG avg ${fmtK(avg(DATA.assets.map(r=>r.ig_views)))}, completion ${avg(DATA.assets.map(r=>r.completion)).toFixed(1)}%\nTalent: ${sum(DATA.talent.map(r=>r.posts))} posts, $${sum(DATA.talent.map(r=>r.mono)).toFixed(0)}, IG avg ${fmtK(avg(DATA.talent.map(r=>r.ig_views)))}, completion ${avg(DATA.talent.map(r=>r.completion)).toFixed(1)}%\nCompare performance differences and each creator's strengths.`;
  el.innerHTML=`
    <div class="summary-box loading" id="sum-compare">正在生成分析小结...</div>
    <div class="legend" style="margin-bottom:.75rem">
      ${Object.entries(CR_COLORS).map(([cr,c])=>`<span><span class="ldot" style="background:${c}"></span>${cr}</span>`).join('')}
      <span style="font-size:11px;color:#b4b2a9">— post count (right axis)</span>
    </div>
    <div class="mtog-row" id="mtog-compare"></div>
    <div style="position:relative;height:280px;margin-bottom:1.5rem"><canvas id="c-cmp-main"></canvas></div>
    <div class="sec">Weekly post count</div>
    <div style="position:relative;height:180px"><canvas id="c-cmp-posts"></canvas></div>`;
  const el2=document.getElementById('mtog-compare');
  el2.innerHTML=METRICS.map(m=>`<button class="mtog${m.key==='ig_views'?' on':''}" data-key="${m.key}">${m.label}</button>`).join('');
  el2.addEventListener('click',e=>{
    const b=e.target.closest('.mtog');if(!b)return;
    el2.querySelectorAll('.mtog').forEach(x=>{x.classList.remove('on');x.style.cssText='';});
    b.classList.add('on');b.style.background='#378ADD';b.style.borderColor='#378ADD';b.style.color='#fff';
    renderCmpMain(b.dataset.key,cmpData,posts);
  });
  renderCmpMain('ig_views',cmpData,posts);
  renderCmpPosts(posts);
  fetchSummary(prompt,'sum-compare');
}

function renderCmpMain(key,cmpData,posts){
  const def=METRICS.find(m=>m.key===key);
  const cid='c-cmp-main';if(CH[cid])CH[cid].destroy();
  const DASHES={Isabella:[],Zhuri:[6,3],Assets:[2,4],Talent:[8,2,2,2]};
  CH[cid]=new Chart(document.getElementById(cid),{type:'line',
    data:{labels:WEEKS,datasets:[
      ...Object.entries(CR_COLORS).map(([cr,c])=>({label:cr,data:cmpData[cr.toLowerCase()][key],borderColor:c,backgroundColor:'transparent',tension:0.3,pointRadius:3,borderWidth:2,borderDash:DASHES[cr],yAxisID:'y'})),
      {label:'Total posts',data:posts,borderColor:'#ccc',borderDash:[3,3],backgroundColor:'transparent',tension:0.3,pointRadius:2,borderWidth:1,yAxisID:'y2'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.datasetIndex<4?def.fmt(ctx.parsed.y):ctx.parsed.y+' posts'}`}}},
      scales:{x:{ticks:{font:{size:10},maxRotation:45,autoSkip:false}},y:{ticks:{font:{size:10},callback:v=>def.fmt(v)},title:{display:true,text:def.label,font:{size:9},color:'#888'}},y2:{position:'right',ticks:{font:{size:10}},grid:{drawOnChartArea:false},title:{display:true,text:'posts',font:{size:9},color:'#ccc'}}}}
  });
}

function renderCmpPosts(posts){
  const cid='c-cmp-posts';if(CH[cid])CH[cid].destroy();
  CH[cid]=new Chart(document.getElementById(cid),{type:'bar',
    data:{labels:WEEKS,datasets:Object.entries(CR_COLORS).map(([cr,c])=>({label:cr,data:DATA[cr.toLowerCase()].map(r=>r.posts),backgroundColor:c+'88',borderColor:c,borderWidth:1,stack:'s'}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{font:{size:10},boxWidth:8,padding:8}}},
      scales:{x:{stacked:true,ticks:{font:{size:10},maxRotation:45,autoSkip:false}},y:{stacked:true,ticks:{font:{size:10}}}}}
  });
}

function buildMono(){
  const el=document.getElementById('panel-mono');
  const totalAll=sum(CAT_DATA.map(c=>c.mono));
  const maxRpp=Math.max(...CAT_DATA.map(c=>c.rpp));
  const sortedByMono=[...CAT_DATA].sort((a,b)=>b.mono-a.mono);
  const top8ByMono=sortedByMono.slice(0,8);

  const prompt=`Q1 2026 FB Monetization by content category:\nTop 5 by total revenue: ${sortedByMono.slice(0,5).map(c=>`${c.cat} ($${c.mono.toFixed(0)}, ${c.posts} posts, $${c.rpp.toFixed(2)}/post)`).join(', ')}\nTop 5 by revenue per post: ${[...CAT_DATA].sort((a,b)=>b.rpp-a.rpp).slice(0,5).map(c=>`${c.cat} ($${c.rpp.toFixed(2)}/post)`).join(', ')}\nTotal Q1 monetization: $${totalAll.toFixed(0)}\nAnalyze which content types deliver the most monetization value and highlight the difference between total revenue and revenue efficiency per post.`;

  const tableRows=sortedByMono.map((c,i)=>{
    const rppPct=Math.round(c.rpp/maxRpp*100);
    const badge=c.rpp>=20?'<span class="badge badge-hi">high</span>':c.rpp>=8?'<span class="badge badge-mid">mid</span>':'<span class="badge badge-lo">low</span>';
    return`<tr>
      <td>${i+1}</td>
      <td style="font-weight:500">${c.cat}</td>
      <td class="num">${c.posts}</td>
      <td class="num">$${c.mono.toFixed(0)}</td>
      <td class="num">$${c.rpp.toFixed(2)}</td>
      <td><div class="rpp-bar-wrap"><div class="rpp-bar" style="width:${rppPct}%"></div></div></td>
      <td>${badge}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`
    ${kpis([
      {l:'Q1 total monetization',v:'$'+totalAll.toFixed(0),s:'all categories'},
      {l:'highest total — Teaser after',v:'$7,140',s:'357 posts'},
      {l:'best rev/post — Teaser before',v:'$33.97',s:'29 posts'},
      {l:'2nd best rev/post — BTS',v:'$12.24',s:'122 posts'},
      {l:'categories tracked',v:CAT_DATA.length,s:'content types'},
    ])}
    <div class="summary-box loading" id="sum-mono">正在生成分析小结...</div>
    <div class="sec">Revenue per post by category (sorted by total revenue)</div>
    <div style="overflow-x:auto;margin-bottom:1.5rem">
      <table class="mono-table">
        <thead><tr>
          <th>#</th><th>Category</th>
          <th class="num">Posts</th>
          <th class="num">Total revenue ($)</th>
          <th class="num">Rev / post ($)</th>
          <th>Efficiency</th>
          <th>Tier</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div class="sec">Weekly revenue — top 8 categories (stacked)</div>
    <div style="position:relative;height:320px"><canvas id="c-mono-stack"></canvas></div>`;

  const CAT_COLORS=['#7F77DD','#1D9E75','#D85A30','#BA7517','#378ADD','#993556','#639922','#E24B4A'];
  const cid='c-mono-stack';if(CH[cid])CH[cid].destroy();
  CH[cid]=new Chart(document.getElementById(cid),{type:'bar',
    data:{labels:MONO_WEEKLY.map(r=>r.week),datasets:top8ByMono.map((c,i)=>({
      label:c.cat,
      data:MONO_WEEKLY.map(r=>r.vals[CAT_DATA.indexOf(c)]||0),
      backgroundColor:CAT_COLORS[i]+'cc',borderColor:CAT_COLORS[i],borderWidth:1,stack:'s',
    }))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9},boxWidth:8,padding:6}}},
      scales:{x:{stacked:true,ticks:{font:{size:10},maxRotation:45,autoSkip:false}},y:{stacked:true,ticks:{font:{size:10},callback:v=>'$'+v.toFixed(0)}}}}
  });
  fetchSummary(prompt,'sum-mono');
}

function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

buildCreator('panel-isabella','Isabella',DATA.isabella,CR_COLORS.Isabella);
buildCreator('panel-zhuri','Zhuri',DATA.zhuri,CR_COLORS.Zhuri);
buildCreator('panel-assets','Assets',DATA.assets,CR_COLORS.Assets);
buildCreator('panel-talent','Talent',DATA.talent,CR_COLORS.Talent);
buildCompare();
buildMono();
